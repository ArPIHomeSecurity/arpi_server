# redirects from HTTP to HTTPS, except MCP for local network access
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # MCP server accessible over HTTP for local network clients
    # (avoids self-signed certificate issues with MCP clients)
    location /mcp {
        proxy_pass http://mcp_server;
        proxy_redirect off;
        proxy_buffering off;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
