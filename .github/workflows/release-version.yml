# This workflow automates the release process for the production build which is
# used in the live environment on the raspberry pi.
# The workflow will bump the version, and create a new release with the build artifacts.
name: Release Version

on:
  push:
    branches:
      - 'dev_*'  # Triggers on any branch starting with 'dev_'
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
          - pre-release
          - release
      pre_release:
        description: 'Pre-release identifier (optional, e.g., "beta", "rc1")'
        required: false
        type: string

jobs:
  release:
    name: Release Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Set input defaults for auto-triggered builds 🎯
        id: set_inputs
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version_type=pre-release" >> $GITHUB_OUTPUT
            echo "pre_release=RC" >> $GITHUB_OUTPUT
          else
            echo "version_type=${{ inputs.version_type }}" >> $GITHUB_OUTPUT
            echo "pre_release=${{ inputs.pre_release }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository 🛎️
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Cache Python packages 📦
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cache-${{ runner.os }}-${{ hashFiles('Pipfile.lock') }}
          restore-keys: |
            pip-cache-${{ runner.os }}-

      - name: Setup Python 🐍
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Configure Git 🔧
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Install dependencies 📦
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/task/task/setup.deb.sh' | sudo -E bash
          sudo apt update && sudo apt install -y jq task
          curl -LsSf https://astral.sh/uv/install.sh | sh
          task create-environment

      - name: Lint code 🧹
        run: |
          task format-check
          task lint

      - name: Bump version 🏷️
        run: |
          if [ "${{ steps.set_inputs.outputs.version_type }}" = "release" ]; then
            python scripts/bump_version.py -r -v
          elif [ "${{ steps.set_inputs.outputs.version_type }}" = "pre-release" ]; then
            python scripts/bump_version.py -p "${{ steps.set_inputs.outputs.pre_release }}" -v
          else
            python scripts/bump_version.py -t ${{ steps.set_inputs.outputs.version_type }} -v
          fi

      - name: Get new version 📋
        id: get_version
        run: |
          VERSION=$(jq -r '.version' src/server/version.json)
          VERSION_SIMPLE=$(scripts/get_package_version.sh) # get python formatted version
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "simple_version=$VERSION_SIMPLE" >> $GITHUB_OUTPUT
          echo "New version: $VERSION"
          echo "Simple version: $VERSION_SIMPLE"

      - name: Commit version changes 💾
        run: |
          git add src/server/version.json
          git commit -m "GitHub Actions: bump version to $(echo '${{ steps.get_version.outputs.version }}' | sed 's/:.*//')"

      - name: Create Git tag 🏷️
        run: |
            git tag "$(echo '${{ steps.get_version.outputs.simple_version }}')" -m "Release version $(echo '${{ steps.get_version.outputs.version }}')"

      - name: Build and package server 🏗️
        run: |
          scripts/create_bootstrap_package.sh
          scripts/create_package.sh

      - name: Push changes and tags 🚀
        run: |
          git push origin
          git push origin --tags

      - name: Setup Node.js for Copilot CLI 🤖
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI 🛠️
        run: npm install -g @github/copilot

      - name: Generate AI release summary ✍️
        id: copilot_summary
        continue-on-error: true
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          PREV_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="$(git rev-list --max-count=20 HEAD | tail -n 1)..HEAD"
          fi

          copilot -p "Summarize the key changes in git range ${RANGE}. Output markdown only with:
          1) a short overview paragraph (max 80 words),
          2) a bullet list of the most important changes,
          3) a short note about version/release impact if visible.
          Write the result to summary.md" \
            --allow-tool='shell(git:*)' \
            --allow-tool=write \
            --no-ask-user

          cat summary.md >> "$GITHUB_STEP_SUMMARY"

          {
            echo "summary<<EOF"
            cat summary.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release 📦
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.simple_version }}
          name: ${{ steps.get_version.outputs.simple_version }}
          draft: false
          prerelease: ${{ steps.set_inputs.outputs.version_type == 'pre-release' }}
          generate_release_notes: true
          files: |
            dist/arpi_server-${{ steps.get_version.outputs.simple_version }}-*.whl
            dist/arpi_server-bootstrap-${{ steps.get_version.outputs.simple_version }}.tar.gz
          body: |
            ## What's Changed

            ${{ steps.copilot_summary.outputs.summary && steps.copilot_summary.outputs.summary || format('This release includes the latest changes from the {0} branch.', github.ref_name) }}

            ### Build Information
            - **Version**: ${{ steps.get_version.outputs.version }}
            - **Branch**: ${{ github.ref_name }}
            - **Build Date**: ${{ github.run_started_at }}
            - **Commit**: ${{ github.sha }}
            - **Workflow Run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
